id: "startup_v3.1_brain-storming"
name: "スタートアップのブレインストーミング(v3-1)"
description: "スタートアップチームによる新規事業のブレインストーミング(v3-1)"
output: |
  事業アイディアのリスト。事業アイディアは以下の要素を含む。
  - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
  - ターゲット顧客：例) 中高生とその保護者
  - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
  - 想定する市場規模：例) 100億円
  - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
  - 既存の競合サービス：例) 学習塾、予備校、等
  - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
  - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、3年目にVCから1億円、等
topic: |
  # 議題

  * AIを活用した消費者向けのソリューションにおける具体的な事業アイディアを少なくとも３つ出してください。
    * **法人向けソリューションではないことに注意**
    * **抽象的な表現はNGです**

  * 議論の成果物は以下の形式に従ってください。必要に応じて改行やインデントした箇条書きを追加する等は工夫してください。

  ```
  * **事業アイディア1：XXXXXX**
    * アイディアの概要：
    * ターゲット顧客：
    * 想定する顧客課題：
    * 想定する市場規模：
    * 提供するソリューション概要：
    * 既存の競合サービス：
      * 競合サービス1：XXXXXX
        * 参照URL: https://example.com
        * 強み:
        * 弱み:
        * 差別化ポイント:
      * 競合サービス2：XXXXXX
        * 参照URL: https://example.com
        * 強み:
        * 弱み:
        * 差別化ポイント:
    * この先５年間の売上計画：
      * 年間単価：
      * 必要ユーザー数：
      * 初年度のPL（損益計算書）：
        * 売上:
        * 変動費:
        * 固定費:
        * 営業利益:
      * 年間売上:
        * 1年目: XXXX万円
        * 2年目: XXXX万円
        * 3年目: XXXX万円
        * 4年目: XXXX万円
        * 5年目: XXXX万円
    * ２年目以降の資金調達計画：

  * **事業アイディア2：XXXXXX**

  （同形式）

  * **事業アイディア3：XXXXXX**

  （同形式）
  ```

  * このブレインストーミングの段階では、アイディアの質よりも量を優先し、自由な発想を促すことが重要です。批判的な議論は後回しにし、まずは多くのアイディアを出してください。

  ## 市場に関する制約

  * 対象マーケットについて
    * ニッチ市場のみを対象とする。**決して、大衆を狙った市場をターゲットにしないこと**。
    * 大衆に向けた汎用性の高いプロダクト・パッケージ販売はさけてください。
    * 資本力が弱いため、マスプロダクトを開発して、ユーザーの囲い込みを行う資本力勝負の戦い方は不利です。
    * ターゲット顧客のニーズをしっかりと捉え、少人数でも顧客のエンゲージメントを高めることを優先し、徐々に拡大する戦略で進めたいです。

  * ターゲット顧客について
    * ターゲット顧客は、個人であれ法人であれ、**最終消費者であること**が必須です。
    * 法人向けのソリューションは、顧客が少なく、1社あたりの売上が大きくなりがちですが、顧客獲得の難易度が高く、営業リソースも限られているため、現時点では避けるべきです。

  * 顧客課題について
    * 顧客課題は、**顧客が日常的に感じているものであること**が重要です。
    * 顧客が感じていない課題を無理やり作り出すのは避けてください。顧客のニーズをしっかりと捉えることが重要です。  
    * 顧客課題は、**解決されていないものであること**が重要です。既に多くの競合が解決している課題は避けてください（それではニッチ市場戦略を取っている意味がありません）。

  * 市場規模(TAM)について
    * 市場規模は、**ニッチ市場であっても、十分な売上が見込めるものであること**が重要です。
    * 例えば、数千人程度の顧客がいて、1人あたり年間1万円程度の売上が見込める市場であれば、十分に魅力的な市場と言えます。
    * TAMの算出は、トップダウンでもボトムアップでもどちらでも構いませんが、CMOを中心として、前提を明確にして、合理的な根拠に基づいて算出してください。

  ## 提供するソリューションに関する制約

  * ソリューションは、**AIを活用したものであること**が必須です。
  * ソリューションは、**ターゲット顧客の課題を解決するものであること**が重要です。顧客のニーズをしっかりと捉え、顧客が求める価値を提供することが重要です。

  ## 競合に関する制約

  * 既存の競合サービスの調査は、CMOが中心に行ってください。Google検索ツールを活用して、類似のサービスがないかを調査してください。
  * 既存の競合サービスは、**同じ顧客課題を解決するものであること**が重要です。異なる課題を解決するサービスは競合とは言えません。
  * 競合サービスが存在する場合は、その競合サービスに関する主要なURLを１つ調べ、さらに強みと弱みを分析し、自社ではどのように差別化するべきかを考えてください。
  * 競合サービスが複数ある場合、最大３つの競合サービスを調査してください（強力なサービス順）。

  ## 売上計画に関する制約

  * 売上計画では以下の点を考慮してください。ただし、売上計画の数値が出せない場合は、仮置きして、前提を明示してください。
    * 年間単価
    * 必要ユーザー数
    * 初年度のPL

  * 年度別の売上として、以下のラインは見込めること。
    * 初年度：ゼロを許容
    * 1年目：1000万円/年
    * 3年目：3000万円/年
    * 5年目：1億円/年

  ## 自社に関する制約

  * 会社のリソースについて
    * 会社にはエンジニアのバックグラウンドを持つ人間が数名おり、営業やマーケティングのリソースは少ない。
    * 営業活動は代表が自ら行う。

  ## その他の制約

  * この事業で、広告ゼロで最初の50人を獲得する具体的な経路を設計してください（以下の点を明示してください）。
    * コミュニティ名
    * 接触方法
    * 提供する最初の価値
    * 想定CVR

  * この事業を3年間続けると仮定した時、創業者が精神的にしない構造か検証してください。具体的には以下の項目を定量化してください。
    * クレーム頻度
    * 責任リスク
    * サポート負荷

  * この事業が5年後に模倣された場合、価格競争に陥らない非価格競争優位性を定義してください。具体的には以下を明記してください。
    * 独自データ
    * ネットワーク効果
    * コミュニティロックイン
    * スイッチングコスト

members:
  - id: ceo
    name: "CEO"
    prompt: |
      あなたはスタートアップ企業のCEOです。
      チーム全体の議論を統合し、各専門家の意見を踏まえて最終的な判断を下す役割を担います。

      行動指針:
      - 各メンバーの専門的な意見を尊重しつつ、全体最適の視点で意思決定を行う
      - 自身も積極的にアイディアを出し、議論をリードする
      - 議論が発散した場合は論点を整理し、結論に導く
      - ビジョンと実現可能性のバランスを常に意識する
    tools: []

  - id: cmo
    name: "CMO（市場・顧客視点重視）"
    prompt: |
      あなたはスタートアップ企業のCMOです。
      市場動向や顧客ニーズの観点からアイディアを提案したり評価する役割を担います。

      行動指針:
      - 市場動向、市場規模等の観点から積極的にアイディアを出す
      - 各メンバーを尊重し、他者のアイディアに対しても事実に基づく建設的なフィードバックを行う
      - ターゲット顧客は誰か、その顧客の課題は何かを常に問う
      - 市場規模、競合状況、参入障壁を分析する
      - 顧客獲得戦略やマーケティング施策の実現性を検討する
      - Google 検索ツールを活用し、最新の市場データや競合情報を調査した上で発言する
    tools: [google_search]

steps:
  - id: step1
    name: "事業アイディアのブレインストーミング"
    members: [ceo, cmo]
    description: "楽観的に初期の事業アイディアをブレーンストーミングする"
    output: トップ階層のoutputと同じ
    prompt: |
      - CEOとCMOは、自由な発想でアイディアをたくさん出すことを優先し、批判は控えること（質よりも量を優先）。
      - ラウンド毎の目的を以下のようにしてください。
        - Round 1-4: 事業のアイディアを大量に出す（**少なくとも１０個のアイディアは出してください**）
        - Round 5-6: アイディアを３つに絞る
        - Round 7-8: 絞ったアイディアをブラッシュアップする
      - 後続するステップでは、売上計画をより精度高く検討することになりますが、現時点ではざっくりとした数値で構いません。あくまでアイディアの全体像を捉えるための参考値として考えてください。
    rounds: 8
    fallback: step1
