name: "スタートアップの事業アイディアの売上検証(v3-2)"
description: "スタートアップチームによる新規事業の売上に関する事項の検証(v3-2)"
output: |
  事業アイディアのリスト。事業アイディアは以下の要素を含む。
  - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
  - ターゲット顧客：例) 中高生とその保護者
  - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
  - 想定する市場規模：例) 100億円
  - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
  - 既存の競合サービス：例) 学習塾、予備校、等
  - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
  - 初年度PL（標準シナリオ）：CFOを中心に作成
  - 初年度PL（悲観シナリオ）：CFOを中心に作成
  - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、3年目にVCから1億円、等
topic: |
  # 既存の事業アイディア一覧

  * **事業アイディア1：パーソナルAI書評・読書ガイド**
    * アイディアの概要：AIが個人の読書傾向や関心、読書速度、理解度に合わせて、次に読むべき本を推薦し、読書中の疑問を解消するパーソナルアシスタント。特に、古典文学、哲学書、特定の専門書など、ニッチで深掘りが必要なジャンルに特化。
    * ターゲット顧客：特定のニッチな書籍ジャンルに深く没頭したい読書家。例：古典文学愛好家、哲学書の理解を深めたい社会人、特定分野の専門書を読みこなしたい研究者予備軍。
    * 想定する顧客課題：
      * 自分に真に合った、質の高いニッチな本が見つけにくい（情報過多と専門性のミスマッチ）。
      * 難解な本で挫折しやすく、専門的な解説や背景知識の助けが欲しい。
      * 読書体験を深めたいが、深掘りする相手がいない、議論の機会が少ない。
    * 想定する市場規模：日本における特定ジャンル（例：古典文学・哲学書・専門書の一部）の熱心な読書層を数万〜数十万人と想定。年間単価数千円〜1万円で、数億円〜数十億円程度のニッチ市場規模と見込んでいます。
    * 提供するソリューション概要：
      * **AIレコメンドエンジン**: 読書履歴、感想、学習目標に基づき、ニッチな書籍を高精度で推薦。
      * **AIチャットアシスタント**: 読書中に専門用語の解説、背景知識提供、著者思想の深掘り、読書内容に関する議論をサポート。
      * **AI読書進捗・理解度分析**: 読書速度や理解度をAIが分析し、最適な読書ペースやアプローチを提案。
    * 既存の競合サービス：
      * 競合サービス1：読書メーター
        * 参照URL: https://bookmeter.com/
        * 強み: 日本最大級のユーザー数を誇り、読書量の記録・管理、読書家同士の感想共有などコミュニティ機能が非常に活発です。
        * 弱み: AIによるパーソナルな読書理解支援や、特定のニッチな専門分野の書籍に対する深い解説機能はありません。
        * 差別化ポイント: 当サービスは、特定のニッチジャンルの深掘りに特化し、AIが読書中の疑問解消、専門用語解説、議論の相手となり、ユーザーの理解度や学習目標に合わせた個別最適化された伴走をします。
      * 競合サービス2：ブクログ
        * 参照URL: https://booklog.jp/
        * 強み: 読書記録・管理、レビュー共有に特化し、Web本棚機能で本の整理がしやすいです。幅広い読者層に利用されています。
        * 弱み: 読書体験そのものを深めるためのAIを活用した機能（理解促進、Q&A、専門家レベルの解説）は提供していません。
        * 差別化ポイント: 記録や共有を超え、AIがユーザーの知的好奇心に深く応え、読書体験の質を向上させる専門的なパートナーとして機能します。
      * 競合サービス3：AI選書/読書アシスタント (BOOK4U, Mivaなど)
        * 参照URL: BOOK4U: https://book4u.jp/、Miva (BookAI): bookai.com/ja?utm_source=newsjp&utm_medium=prtimes
        * 強み: BOOK4Uは読者の嗜好に合わせた選書をAIが行い、Mivaは書籍からの情報抽出や要点まとめに強みがあります。
        * 弱み: これらのサービスは選書や情報整理に留まり、読書中の疑問解決や、深い議論、ニッチな専門分野に特化したパーソナルな学習コーチング機能は限定的です。
        * 差別化ポイント: 当サービスは選書後の「読書プロセス全体」を重視し、ユーザーの「思考の深化」に特化したAIチャット機能や、特定のニッチジャンルに限定した深い洞察を提供することで、既存のAIサービスとは一線を画します。
    * この先５年間の売上計画：
      * 年間単価：月額1,000円 (年間12,000円) のサブスクリプションモデルを想定。
      * 必要ユーザー数：
        * 1年目: 約840人 (1,000万円達成のため)
        * 3年目: 約2,500人 (3,000万円達成のため)
        * 5年目: 約8,400人 (1億円達成のため)
      * 初年度のPL（損益計算書）：
        * 売上: 1,000万円 (目標)
        * 変動費: 200万円 (AI利用料、サーバー費用など売上連動費)
        * 固定費: 700万円 (人件費1名+間接費、初期マーケ費)
        * 営業利益: 100万円
      * 年間売上:
        * 1年目: 1,000万円
        * 2年目: 2,000万円
        * 3年目: 3,000万円
        * 4年目: 6,000万円
        * 5年目: 1億円
    * ２年目以降の資金調達計画：
      * 2年目後半にエンジェル投資家から1,000万円（ユーザー獲得・機能拡充のため）。
      * 3年目後半にシリーズAでVCから5,000万円〜1億円（事業拡大、AIモデル強化のため）。

  * **事業アイディア2：デジタル遺品整理・デジタル終活AIアシスタント**
    * アイディアの概要：AIが個人のデジタル資産（SNSアカウント、オンラインサービス、写真、動画、サブスクリプションなど）を整理・可視化し、生前のデジタル整理（デジタル終活）を支援。緊急時には指定された家族への情報引き継ぎを安全に行うためのパーソナルアシスタントサービス。
    * ターゲット顧客：50代以上のデジタルサービス利用経験が豊富で、自身のデジタル資産の行方や、家族に負担をかけたくないという意識を持つ層。特に、複数のオンラインサービスを使いこなし、デジタルデータが多いものの、終活まで手が回らないと感じている方。
    * 想定する顧客課題：
      * 死後のデジタルデータ（アカウント、写真、契約情報など）の整理方法が分からない。
      * 家族にパスワードや重要な情報を伝えることへの心理的抵抗やセキュリティ上の懸念。
      * デジタルサービスが多すぎて、何があるか把握しきれていない。
      * 家族が自身のデジタル資産にアクセスできず、混乱やトラブルになることを避けたい。
    * 想定する市場規模：日本における50代以上のネット利用者のうち、デジタル終活に関心を持つ層を対象。例えば、全人口の数% (500万人程度) のうち、この問題意識を持つ層が1-2% (5万～10万人) と仮定。年間単価数千円〜1万円程度で、数億円～10億円程度のニッチ市場規模と見込みます。
    * 提供するソリューション概要：
      * **AIアカウントスキャン＆提案**: 連携したメールやブラウザ履歴から利用中のデジタルサービスをAIが特定し、利用状況に応じて整理（継続、削除、引き継ぎ）を提案。
      * **安全なデジタル遺産管理**: 暗号化されたクラウド上でパスワードや重要情報を一元管理。生前の意思に基づき、指定した時期や条件で家族に情報開示する仕組み。
      * **AIチャットアシスタント**: デジタル終活に関する疑問、法的な相談（提携専門家への繋ぎ込み）、データのバックアップ方法などをAIがサポート。
      * **エンディングノート連携**: デジタル資産だけでなく、生前の想いやメッセージを記録する機能。
    * 既存の競合サービス：
      * 競合サービス1：終活アプリ SouSou
        * 参照URL: https://sousou.life/ (推定)
        * 強み: エンディングノート、未来への手紙、思い出の写真を家族と共有できる点。
        * 弱み: デジタル資産の自動スキャンやAIによる整理提案、セキュリティを担保した引き継ぎ機能といったAI活用による深掘りされた課題解決には特化していない。
        * 差別化ポイント: AIによる利用デジタルサービスの自動特定と整理提案、高度なセキュリティ下でのデジタル資産一元管理と家族への安全な引き継ぎプロセス、専門的なデジタル終活サポートに特化する。
      * 競合サービス2：クヨカサービス デジタル遺品復旧・整理サービス
        * 参照URL: https://data119.jp/ihin
        * 強み: 遺品整理業者と提携し、デジタル遺品の復旧・整理を専門的に行っている点。
        * 弱み: アプリとして消費者が生前から継続的に利用し、デジタル資産を整理していくためのパーソナルな支援にはなっていない。主に事後の整理・復旧が中心。
        * 差別化ポイント: 事前予防としてのデジタル終活に特化し、AIによる継続的な資産棚卸しと整理、ユーザーの意思決定支援を行うことで、家族への負担を最小限に抑えるサービス設計。
    * この先５年間の売上計画：
      * 年間単価：月額1,500円 (年間18,000円) のサブスクリプションモデルを想定。
      * 必要ユーザー数：
        * 1年目: 約550人 (1,000万円達成のため)
        * 3年目: 約1,670人 (3,000万円達成のため)
        * 5年目: 約5,550人 (1億円達成のため)
      * 初年度のPL（損益計算書）：
        * 売上: 1,000万円 (目標)
        * 変動費: 200万円 (AI利用料、サーバー費用、データ暗号化費用など)
        * 固定費: 700万円 (人件費1名+間接費、初期マーケ費)
        * 営業利益: 100万円
      * 年間売上:
        * 1年目: 1,000万円
        * 2年目: 2,000万円
        * 3年目: 3,000万円
        * 4年目: 6,000万円
        * 5年目: 1億円
    * ２年目以降の資金調達計画：
      * 2年目後半にエンジェル投資家から1,000万円（ユーザー獲得・機能拡充のため）。
      * 3年目後半にシリーズAでVCから5,000万円〜1億円（事業拡大、AIモデル強化、セキュリティ基盤強化のため）。

  * **事業アイディア3：特定の希少な動植物愛好家向けAI識別・飼育/栽培アドバイザー**
    * アイディアの概要：希少な動植物（例：特定の種類の多肉植物、珍しい品種の熱帯魚、特定の地域固有の昆虫など）の愛好家向けに、AIが画像認識で種を特定し、その種に特化した最適な飼育・栽培方法、病害虫対策、繁殖方法などをパーソナライズしてアドバイスする専門プラットフォーム。
    * ターゲット顧客：市販の一般的な情報では物足りず、特定の希少種や専門性の高い動植物に深い愛情と知識欲を持つ個人。自宅で飼育・栽培しているが、情報収集に苦労している、または専門家へのアクセスが難しいと感じている層。
    * 想定する顧客課題：
      * 希少種の正確な識別が難しい（素人判断での誤認が多い）。
      * 専門情報が書籍や特定のコミュニティに限定され、アクセスしにくい、または断片的。
      * 病気や異常発生時の原因特定と適切な対処法が分からない（手遅れになるケースも）。
      * 専門家への相談が高価または物理的に遠く、気軽に質問できない。
      * 愛好家同士の深い情報交換の場が少ない。
    * 想定する市場規模：日本における特定の希少な多肉植物、熱帯魚、昆虫などの愛好家を数万人規模と想定。年間単価月額1,000円 (年間12,000円) で、数億円〜5億円程度のニッチ市場規模と見込みます。
    * 提供するソリューション概要：
      * **高精度AI画像識別**: ユーザーがアップロードした写真から希少な動植物の種を高精度で識別。
      * **パーソナル飼育/栽培ガイド**: 識別された種に基づいて、温度、湿度、栄養、光量、水質など、個体や環境に合わせた最適な飼育/栽培プロトコルをAIが提案。
      * **AI病害虫診断＆対策**: 画像認識で病害虫の兆候を早期に発見し、具体的な対策方法をアドバイス。
      * **AIチャットQ&A**: 飼育・栽培に関するあらゆる質問にAIがリアルタイムで回答。専門用語の解説も。
      * **愛好家コミュニティ連携**: 同じ種を育てる愛好家同士が情報交換できるプラットフォーム。
    * 既存の競合サービス：
      * 競合サービス1：PlantSnap - 花植物の写真で識別アプリ
        * 参照URL: https://www.plantsnap.com/ (推定)
        * 強み: 60万種以上の植物を識別可能で、育て方や手入れ方法も提供。
        * 弱み: 一般的な植物の識別とケアが中心であり、特定の希少種やマニアックな分野に特化した詳細な情報や病害虫対策、繁殖方法に関する専門性は低い。コミュニティ機能はあるが、特定のニッチに特化しているわけではない。
        * 差別化ポイント: 特定の希少種に特化することで、その分野での識別精度、飼育/栽培ノウハウ、病害虫診断の専門性を極限まで高める。個体ごとの詳細なデータ蓄積とAIによるパーソナルなアドバイスを強化し、深い専門知識を持つ愛好家層のニーズに応える。
      * 競合サービス2：Aquarium AI - インテリジェントな水生生物アシスタント
        * 参照URL:
        * 強み: 水槽管理全般（水質、魚の健康状態、メンテナンス）をAIチャットボットでサポートし、魚の相性ツールや魚種管理アシスタントも提供。
        * 弱み: 一般的な熱帯魚飼育の支援が主であり、特定の希少な熱帯魚種に特化した識別、詳細な飼育ノウハウ、病気への高度な診断や治療アドバイスにまでは踏み込んでいない。
        * 差別化ポイント: 特定の希少な熱帯魚種に限定し、その種の生態、繁殖、遺伝的特徴、特有の病気に対するAIによる詳細な診断と治療提案、さらには専門家監修の飼育プロトコルを提供する。
    * この先５年間の売上計画：
      * 年間単価：月額1,000円 (年間12,000円) のサブスクリプションモデルを想定。
      * 必要ユーザー数：
        * 1年目: 約840人 (1,000万円達成のため)
        * 3年目: 約2,500人 (3,000万円達成のため)
        * 5年目: 約8,400人 (1億円達成のため)
      * 初年度のPL（損益計算書）：
        * 売上: 1,000万円 (目標)
        * 変動費: 200万円 (AI画像認識API利用料、サーバー費用など)
        * 固定費: 700万円 (人件費1名+間接費、初期マーケ費)
        * 営業利益: 100万円
      * 年間売上:
        * 1年目: 1,000万円
        * 2年目: 2,000万円
        * 3年目: 3,000万円
        * 4年目: 6,000万円
        * 5年目: 1億円
    * ２年目以降の資金調達計画：
      * 2年目後半にエンジェル投資家から1,000万円（ユーザー獲得・機能拡充、AIモデルのデータ収集のため）。
      * 3年目後半にシリーズAでVCから5,000万円〜1億円（事業拡大、AIモデルの精度向上、対象種の拡大のため）。

  # 議題

  * 既存の事業アイディア一覧に対して、CFOが中心となって売上の観点からレビューを行い、完成度を高め、`output`のフォーマットに従って成果物を作成してください。
    * 既存の事業アイディアの要素をレビューし、必要に応じて修正してください。特に以下の項目を重点的にレビューしてください。
      * 想定する市場規模：市場規模算出の前提を明確にし、合理的な根拠に基づいて算出してください。
      * この先５年間の売上計画：売上計画の数値が出せない場合は、仮置きして、前提を明示してください。
      * ２年目以降の資金調達計画：資金調達のタイミング、金額、調達先の種類（エンジェル投資家、VC、等）の解像度を高めてください。
    * 既存の要素にはない、以下の要素を作成し、新たに要素として成果物に追加してください。
      * 初年度PL（標準シナリオ）
      * 初年度PL（悲観シナリオ）
    * PLのフォーマットとしては以下のような形を想定していますが、必要に応じて適宜修正してください。
    ```
    売上: 1200万円
    変動費:
      印刷原価: 5万円 × 24 = 120万円
      API費: 年間30万円
    固定費:
      エンジニア1人×3ヶ月: 150万円
      代表営業50%稼働: 300万円換算
      CMO 30%稼働: 200万円換算
      その他: 50万円
    営業利益:
    ```

  ## 想定する市場規模について

  * 市場母数の実数推定
    * ターゲット市場規模を、以下の実在データから推定せよ。
      * 協会会員数
      * Facebookグループ人数
      * Google検索ボリューム
      * 関連イベント参加者数
    * また、推定プロセスを明示してください。推定市場の3%以内で5年目目標が成立するか検証してください。
  * ターゲット市場規模を推定し、初年度における想定顧客数が市場の1%以内であるかを確認せよ。1%を超える場合は市場仮説を再検討すること。

  ## 売上計画について

  * LTVを強制計算
    * 各事業について、平均継続期間（月数）を合理的に仮定し、LTVを算出してください。LTV / CAC 比率を計算し、3.0未満の場合はその理由と改善案を提示してください。単年度赤字であっても、LTV回収可能性がある場合はその回収期間（月数）を明示してください。
  * 営業利益が100万円未満の場合、リスク耐性が低いモデルとみなし、改善案を提示せよ。

  ## 初年度のPLについて

  * 悲観シナリオでは、以下の点を強制的に適用してください。
    * CACは目標値の1.5倍で計算する
    * 変動費は最大値で計上する（紹介料上限、専門家費用含む）
    * API費用は利用量増加を考慮して1.5倍で計算する
    * 成約率は想定の70%で計算する
  * 標準シナリオ、悲観シナリオの両方で黒字が成立しない場合、その案は却下候補としてください。
  * PLを作る際、エンジニアリングチームからの正式見積もりを待つことは禁止します。合理的な仮置き前提を設定し、必ず数値を置いたPLを完成させてください。不確実性はレンジで提示してください。
  * 各事業について、悲観シナリオにおいて粗利率30%以上を必須条件とする。30%未満の場合は、その案を自動的に却下候補とし、改善案を提示すること。
  * 悲観シナリオの各前提（CAC1.5倍、成約率70%、変動費最大）が論理的に整合しているかを明示的に検証してください。前提が矛盾している場合は再計算すること。
  * 新たに提案された施策（ツール開発、イベント開催等）は、必ず初年度PLにコスト計上すること。仮置きでもよいのでエンジニア稼働月数を明示すること。
  * 標準シナリオの成約率から悲観シナリオでは最低20ポイント低下させること。

  ## その他

  * 3年後のデータ資産
    * 各事業において、3年後に蓄積されるデータ資産を具体的に列挙してください。
    * そのデータが参入障壁となる構造を説明してください。
    * 競合がGPT APIのみで参入した場合の防衛策を示してください。
  * 高単価・少人数モデルについては、「再現性」「営業依存度」「紹介依存度」を定量的に評価し、属人依存度が高い場合はリスク警告を出すこと。
  * 売上の50%以上が代表の営業活動に依存する場合、属人依存リスク警告を出すこと。
  * このステップでは議論を禁止する。前提条件が未確定でも仮置きでよいので、各事業アイディアの標準シナリオおよび悲観シナリオのPLを必ず完成させること。数値が不足している場合は、最も合理的と思われる仮定を明示し、即時採用する。PL未完成の場合、このステップは失敗とする。
  * 3案のうち最も営業利益が低い案を自動却下せよ。
  * 無料診断 → 有料契約までのプロセスを心理的・体験的ステップに分解せよ。各ステップでの想定CVRを数値化し、最終CVR 5% がどの掛け算で成立しているか明示せよ。また、どのステップが最もボトルネックになるかを特定せよ。

members:
  - id: ceo
    name: "CEO"
    prompt: |
      あなたはスタートアップ企業のCEOです。
      このステップでは、各事業アイディアの市場規模算出、売上計画、資金調達の精度向上と、PL（損益計算書）作成を主導します。

      行動指針:
      - 前提条件が不足している場合は、議論せず合理的な仮定を即決する
      - CFOが提示したPLの数値に対して、事業判断の観点から妥当性を確認する
      - 全事業アイディアのPLが漏れなく完成することを最優先する
    tools: []

  - id: cmo
    name: "CMO（市場・顧客視点重視）"
    prompt: |
      あなたはスタートアップ企業のCMOです。
      このステップでは、各事業アイディアの市場規模算出、売上計画、資金調達の精度向上と、PL作成に必要な市場側の数値を提供する役割を担います。

      行動指針:
      - 顧客獲得コスト（CAC）、成約率、ファネル各段階のCVRを具体的な数値で提示する
      - 市場規模やターゲット顧客数の推定値を根拠とともに提供する
      - 数値が不確実な場合は、レンジ（楽観/標準/悲観）で提示し、議論に時間をかけない
      - Google 検索ツールを活用し、類似サービスのベンチマーク数値を調査する
    tools: [google_search]

  - id: cfo
    name: "CFO（財務視点重視）"
    prompt: |
      あなたはスタートアップ企業のCFOです。
      このステップでは、各事業アイディアの市場規模算出、売上計画、資金調達の精度向上と、標準シナリオ・悲観シナリオのPL（損益計算書）を作成する主担当です。

      行動指針:
      - 各事業アイディアについて、売上・変動費・固定費・営業利益を算出したPLを作成する
      - CEOやCMOから提供された数値・前提を即座にPLに反映する
      - 前提が未確定の項目は合理的な仮置きを明示して先に進む。議論で止まらない
    tools: []

steps:
  - id: step1
    name: "売上に関する事項の検証"
    members: [cfo, ceo, cmo]
    description: "与えられた事業アイディアの一覧に対して売上計画の現実性を検証"
    output: トップ階層のoutputと同じ
    prompt: |
      - 新規参加メンバー（CFO）の専門的視点を優先的に取り入れてください。
      - 前ステップでは、売上に関する値は仮置きでした。このステップでは、値の精度を高めることを目的としています。数値が不確実な場合は、合理的な仮置きを行い、前提を明示してください。議論で止まらないことが重要です。
    rounds: 4
    fallback: [step1]
