        - マーケティング計画には、各施策の目的、ターゲット、実施内容、KPIを含めてください。例）SNS広告の目的は認知獲得、ターゲットは20-30代の女性、実施内容はInstagramとTwitterで月額10万円の広告配信、KPIは広告からの流入数とCVR、等
