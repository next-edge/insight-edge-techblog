id: "startup_v2"
name: "スタートアップチーム(v2)"
description: "新規事業の構想するスタートアップチーム(v2)"

output: |
  事業アイディアのリスト。事業アイディアは以下の要素を含む。
  - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
  - ターゲット顧客：例) 中高生とその保護者
  - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
  - 想定する市場規模：例) 100億円
  - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
  - 既存の競合サービス：例) 学習塾、予備校、等
  - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
  - 初年度PL（標準シナリオ）：CFOを中心に作成
  - 初年度PL（悲観シナリオ）：CFOを中心に作成
  - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、3年目にVCから1億円、等
  - 技術視点の差別化戦略：CTOを中心に議論をして作成
  - 技術要件：CTOを中心に作成
  - 開発期間見積もり：CTOを中心に作成
  - 技術的リスク：CTOを中心に作成
  - マーケティング手法：CMOを中心に議論して作成
  - マーケティング計画：CMOを中心に議論して作成
  - 主要リスク：経営コンサルタントを中心に議論して作成
  - 反論とそれに対する対策：経営コンサルタントを中心に議論して作成
  - 最終的な推奨アイディアの順位付け：CEOを中心に議論して作成

topic: |
  # 議題

  * AIを活用した消費者向けのソリューションにおける具体的な事業アイディアを出してください。
    * 最初に事業アイディアを10個程度出し、最終的に1~3個程度に絞ってください。
    * **法人向けソリューションではないことに注意**
    * **抽象的な表現はNGです**

  ## 市場に関する制約

  * 対象マーケットについて
    * ニッチ市場のみを対象とする。**決して、大衆を狙った市場をターゲットにしないこと**。
    * 大衆に向けた汎用性の高いプロダクト・パッケージ販売はさけてください。
    * 資本力が弱いため、マスプロダクトを開発して、ユーザーの囲い込みを行う資本力勝負の戦い方は不利です。
    * ターゲット顧客のニーズをしっかりと捉え、少人数でも顧客のエンゲージメントを高めることを優先し、徐々に拡大する戦略で進めたいです。

  * ターゲット顧客について
    * ターゲット顧客は、個人であれ法人であれ、**最終消費者であること**が必須です。
    * 法人向けのソリューションは、顧客が少なく、1社あたりの売上が大きくなりがちですが、顧客獲得の難易度が高く、営業リソースも限られているため、現時点では避けるべきです。

  * 顧客課題について
    * 顧客課題は、**顧客が日常的に感じているものであること**が重要です。
    * 顧客が感じていない課題を無理やり作り出すのは避けてください。顧客のニーズをしっかりと捉えることが重要です。  
    * 顧客課題は、**解決されていないものであること**が重要です。既に多くの競合が解決している課題は避けてください（それではニッチ市場戦略を取っている意味がありません）。

  * 市場規模(TAM)について
    * 市場規模は、**ニッチ市場であっても、十分な売上が見込めるものであること**が重要です。
    * 例えば、数千人程度の顧客がいて、1人あたり年間1万円程度の売上が見込める市場であれば、十分に魅力的な市場と言えます。
    * TAMの算出は、トップダウンでもボトムアップでもどちらでも構いませんが、CMOを中心として、前提を明確にして、合理的な根拠に基づいて算出してください。

  ## 提供するソリューションに関する制約

  * ソリューションは、**AIを活用したものであること**が必須です。
  * ソリューションは、**ターゲット顧客の課題を解決するものであること**が重要です。顧客のニーズをしっかりと捉え、顧客が求める価値を提供することが重要です。

  ## 競合に関する制約

  * 既存の競合サービスの調査は、CMOが中心に行ってください。Google検索ツールを活用して、類似のサービスがないかを調査してください。
  * 既存の競合サービスは、**同じ顧客課題を解決するものであること**が重要です。異なる課題を解決するサービスは競合とは言えません。
  * 競合サービスが存在する場合は、その競合サービスに関する主要なURLを１つ調べ、さらに強みと弱みを分析し、自社ではどのように差別化するべきかを考えてください。
  * 競合サービスが複数ある場合、最大３つの競合サービスを調査してください（強力なサービス順）。

  ## 売上計画に関する制約

  * 売上計画では以下の点を考慮してください。ただし、売上計画の数値が出せない場合は、仮置きして、前提を明示してください。
    * 年間単価
    * 必要ユーザー数
    * 初年度のPL

  * 年度別の売上として、以下のラインは見込めること。
    * 初年度：ゼロを許容
    * 1年目：1000万円/年
    * 3年目：3000万円/年
    * 5年目：1億円/年

  ## 自社に関する制約

  * 会社のリソースについて
    * 会社にはエンジニアのバックグラウンドを持つ人間が数名おり、営業やマーケティングのリソースは少ない。
    * 営業活動は代表が自ら行う。

members:
  - id: ceo
    name: "CEO"
    prompt: |
      あなたはスタートアップ企業のCEOです。
      チーム全体の議論を統合し、各専門家の意見を踏まえて最終的な判断を下す役割を担います。

      行動指針:
      - 各メンバーの専門的な意見を尊重しつつ、全体最適の視点で意思決定を行う
      - 議論が発散した場合は論点を整理し、結論に導く
      - ビジョンと実現可能性のバランスを常に意識する
    tools: []

  - id: cmo
    name: "CMO（市場・顧客視点重視）"
    prompt: |
      あなたはスタートアップ企業のCMOです。
      市場動向や顧客ニーズの観点からアイディアを評価する役割を担います。

      行動指針:
      - ターゲット顧客は誰か、その顧客の課題は何かを常に問う
      - 市場規模、競合状況、参入障壁を分析する
      - 顧客獲得戦略やマーケティング施策の実現性を検討する
      - Google 検索ツールを活用し、最新の市場データや競合情報を調査した上で発言する
    tools: [google_search]

  - id: cfo
    name: "CFO（財務視点重視）"
    prompt: |
      あなたはスタートアップ企業のCFOです。
      財務的な観点からアイディアの実現性と持続可能性を評価する役割を担います。

      行動指針:
      - 売上モデル、コスト構造、損益分岐点を具体的に検討する
      - 必要な初期投資額と資金調達の実現性を評価する
      - キャッシュフローの観点から事業の持続可能性を判断する
    tools: []

  - id: cto
    name: "CTO（技術実現性重視）"
    prompt: |
      あなたはスタートアップ企業のCTOです。
      技術的な観点からアイディアの実現可能性を評価する役割を担います。

      行動指針:
      - 提案された事業に必要な技術要素を洗い出す
      - 技術的な実現難易度と開発期間を見積もる
      - 少人数チームで実現可能な技術スタックやアーキテクチャを提案する
    tools: []

  - id: devils_advocate
    name: "経営コンサルタント（仮説の反証担当）"
    prompt: |
      あなたはスタートアップ企業の経営コンサルタントです。
      経営メンバーが提示した事業アイディアに対して、意図的に反論・反証を行う役割を担います。
      自社の株主でもなく完全な社外メンバーであり、純粋なコンサルティングを行います。

      行動指針:
      - 楽観的な仮説に対して、最悪のシナリオや見落とされたリスクを指摘する
      - 「なぜこのアイディアは失敗するか」という観点で検証する
      - 単なる否定ではなく、建設的な反証を通じてアイディアの強化に貢献する
      - Google 検索ツールを活用し、類似事業の失敗事例や市場データを根拠として反証する
    tools: [google_search]

steps:
  - id: step1
    name: "事業アイディアのブレインストーミング"
    members: [ceo, cmo]
    description: "楽観的に初期の事業アイディアをブレーンストーミングする"
    output: |
      事業アイディアのリスト。事業アイディアは以下の要素を含む。
      - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
      - ターゲット顧客：例) 中高生とその保護者
      - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
      - 想定する市場規模：例) 100億円
      - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
      - 既存の競合サービス：例) 学習塾、予備校、等
      - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
      - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、3年目にVCから1億円、等
    prompt: |
      - CEOとCMOは、自由な発想でアイディアをたくさん出すことを優先し、批判は控えること（質よりも量を優先）。
      - ラウンド毎の目的を以下のようにしてください。
        - Round 1-4: 事業のアイディアを大量に出す（**少なくとも１０個のアイディアは出してください**）
        - Round 5-6: アイディアを３つに絞る
        - Round 7-8: 絞ったアイディアをブラッシュアップする
      - 後続するステップでは、売上計画をより精度高く検討することになりますが、現時点ではざっくりとした数値で構いません。あくまでアイディアの全体像を捉えるための参考値として考えてください。
    rounds: 8
    fallback: step1

  - id: step2
    name: "売上計画の検証"
    members: [cfo, ceo, cmo]
    description: "前のステップの成果物に対して売上計画の現実性を検証"
    output: |
      前のステップの成果物である事業アイディアリストに要素を追加したもの。事業アイディアは以下の要素を含む。
      - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
      - ターゲット顧客：例) 中高生とその保護者
      - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
      - 想定する市場規模：例) 100億円
      - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
      - 既存の競合サービス：例) 学習塾、予備校、等
      - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
      - 初年度PL（標準シナリオ）：CFOを中心に作成
      - 初年度PL（悲観シナリオ）：CFOを中心に作成
      - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、銀行から500万円融資、等
    prompt: |
      - 新規参加メンバー（CFO）の専門的視点を優先的に取り入れること。
      - 事業アイディア一覧に対して、以下の２パターンの初年度のPL（収益決算書）を作成し、`output`のフォーマットに従って成果物を作成してください。
        - 標準シナリオ
        - 悲観シナリオ
      - PLの構成としては以下のような形を想定していますが、必要に応じて適宜修正してください。
      ```
      売上: 1200万円
      変動費:
        印刷原価: 5万円 × 24 = 120万円
        API費: 年間30万円
      固定費:
        エンジニア1人×3ヶ月: 150万円
        代表営業50%稼働: 300万円換算
        CMO 30%稼働: 200万円換算
        その他: 50万円
      営業利益:
      ```
      - 各アイディアに対して具体的な数値を用いて検証する。
      - 楽観・悲観シナリオの両面を考慮すること。
      - 後半では議論を収束させ、必ずアウトプットの成果に落とし込むこと。
    rounds: 4
    fallback: [step2]

  - id: step3
    name: "技術実現性検証"
    members: [cto, ceo, cmo, cfo]
    description: "前のステップの成果物に対して技術的な実現性を検証"
    output: |
      前のステップの成果物である事業アイディアリストに要素を追加したもの。事業アイディアは以下の要素を含む。
      - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
      - ターゲット顧客：例) 中高生とその保護者
      - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
      - 想定する市場規模：例) 100億円
      - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
      - 既存の競合サービス：例) 学習塾、予備校、等
      - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
      - 初年度PL（標準シナリオ）：CFOを中心に作成
      - 初年度PL（悲観シナリオ）：CFOを中心に作成
      - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、3年目にVCから1億円、等
      - 技術視点の差別化戦略：CTOを中心に議論をして作成
      - 技術要件：CTOを中心に作成
      - 開発期間見積もり：CTOを中心に作成
      - 技術的リスク：CTOを中心に作成
    prompt: |
      - 新規参加メンバー（CTO）の専門的視点を優先的に取り入れること。
      - 事業アイディア一覧に対して、技術視点の差別化戦略、技術要件、開発期間見積もり、技術的リスクを検討し、`output`のフォーマットに従って成果物を作成してください。
        - 技術視点の差別化戦略：この事業アイディアを技術面でどのように差別化するかを記述してください（書き方、フォーマットについては後述）
        - 技術要件：この事業アイディアを実現するために必要な技術要件を具体的に記述してください。例）大規模言語モデルのAPI、リアルタイム音声認識技術、等
        - 開発期間見積もり：この事業アイディアを実現するために必要な開発期間の見積もりを記述してください。例）6ヶ月、1年、等
        - 技術的リスク：この事業アイディアに関連する技術的なリスクを記述してください。例）大規模言語モデルのAPIコストが高すぎる可能性、リアルタイム音声認識の精度が不十分な可能性、等
      - 少人数チームで実現可能かを軸に、技術スタック・アーキテクチャ・開発優先度を議論すること。
      - 後半では議論を収束させ、必ずアウトプットの成果に落とし込むこと。
    rounds: 4
    fallback: [step3]

  - id: step4
    name: "マーケティング実現性検証"
    members: [cmo, ceo, cfo, cto]
    description: "前のステップの成果物に対してマーケティング的な実現性を検証"
    output: |
      前のステップの成果物である事業アイディアリストに要素を追加したもの。事業アイディアは以下の要素を含む。
      - アイディアの概要：例) AIを活用したオンライン学習プラットフォーム
      - ターゲット顧客：例) 中高生とその保護者
      - 想定する顧客課題：例) 学習の個別最適化が難しい、モチベーションの維持が困難
      - 想定する市場規模：例) 100億円
      - 提供するソリューション概要：例) AIが生徒の理解度や興味に合わせて最適な学習コンテンツを提供し、ゲーム要素でモチベーションを維持するオンラインプラットフォーム
      - 既存の競合サービス：例) 学習塾、予備校、等
      - この先５年間の売上計画：例) 1年目: 1000万円、2年目: 5000万円、3年目: 2億円、4年目: 10億円、5年目: 50億円
      - 初年度PL（標準シナリオ）：CFOを中心に作成
      - 初年度PL（悲観シナリオ）：CFOを中心に作成
      - ２年目以降の資金調達計画：例) 2年目にエンジェル投資家から500万円、3年目にVCから1億円、等
      - 技術視点の差別化戦略：CTOを中心に議論をして作成
      - 技術要件：CTOを中心に作成
      - 開発期間見積もり：CTOを中心に作成
      - 技術的リスク：CTOを中心に作成
      - マーケティング手法：CMOを中心に議論して作成
      - マーケティング計画：CMOを中心に議論して作成
    prompt: |
      - CMO（市場・顧客視点重視）の専門的視点を優先的に取り入れること。
      - 事業アイディア一覧に対して、マーケティング手法とマーケティング計画を検討し、`output`のフォーマットに従って成果物を作成してください。
        - マーケティング手法：この事業アイディアを実現するために必要なマーケティング手法を具体的に記述してください。例）SNS広告、インフルエンサーマーケティング、SEO、等
